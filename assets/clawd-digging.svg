<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .blink{transform-origin:7.5px 9px;animation:blink 4s infinite}
  .bob{transform-origin:7.5px 15px;animation:bob 2s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 2s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 2s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 2s infinite ease-in-out}
  .eyes{animation:eyes-dig 2s infinite ease-in-out}
  .dirt{opacity:0}
  .d1{animation:dirt-fly 2s .58s infinite}
  .d2{animation:dirt-fly 2s .70s infinite}
  .d3{animation:dirt-fly 2s .44s infinite}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.4px)}}
  @keyframes blink{0%,8%,100%{transform:scaleY(1)}4%{transform:scaleY(0.1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.4px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.02);opacity:.52}}
  @keyframes arm-l{0%,100%{transform:rotate(15deg)}40%,60%{transform:rotate(0deg)}}
  @keyframes arm-r{0%,100%{transform:rotate(-5deg)}40%,60%{transform:rotate(38deg)}}
  @keyframes eyes-dig{0%,100%{transform:translate(2px,.5px)}40%,60%{transform:translate(3px,1.5px)}}
  @keyframes dirt-fly{0%,43%{opacity:0;transform:translate(0,0)}48%{opacity:1}95%{opacity:0;transform:translate(-5px,-6px)}}
</style></defs>

<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Dirt pile right side -->
<rect x="17" y="12" width="2" height="1" fill="#8D6E63"/>
<rect x="16" y="13" width="4" height="1" fill="#795548"/>
<rect x="15" y="14" width="5" height=".8" fill="#6D4C41"/>

<!-- Hole -->
<rect x="17" y="14.5" width="3" height=".7" fill="#3E2723"/>

<!-- Dirt particles -->
<g fill="#BCAAA4">
  <rect class="dirt d1" x="18" y="12" width="1" height=".8"/>
  <rect class="dirt d2" x="20" y="10.5" width=".8" height=".8"/>
  <rect class="dirt d3" x="16.5" y="10" width="1" height=".7"/>
</g>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body -->
<g class="bob"><g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <g class="eyes"><g class="blink" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g></g>
</g></g>

<!-- Left arm (upper grip on handle) -->
<g class="bob"><g class="breathe">
  <g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>

<!-- Right arm + shovel LAST -->
<g class="bob"><g class="breathe">
  <g class="arm-r">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
    <!-- Grip crossbar -->
    <rect x="13.4" y="10.8" width="1.8" height=".7" fill="#4E342E"/>
    <!-- Handle shaft -->
    <rect x="14" y="11" width=".9" height="5.8" fill="#795548"/>
    <!-- Blade shoulder -->
    <rect x="12.8" y="16.2" width="3.2" height=".8" fill="#78909C"/>
    <!-- Blade tip -->
    <rect x="13.2" y="17" width="2.4" height=".7" fill="#607D8B"/>
  </g>
</g></g>
</svg>
