<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .blink{transform-origin:7.5px 9px;animation:blink 5s infinite}
  .bob{transform-origin:7.5px 15px;animation:bob 3s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 3s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 10s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 8s infinite ease-in-out}
  .eyes{animation:eyes 8s infinite ease-in-out}
  .code-line{transform-box:fill-box;transform-origin:left center}
  .bl1{animation:bwrite 12s 0s infinite}
  .bl2{animation:bwrite 12s -3s infinite}
  .bl3{animation:bwrite 12s -6s infinite}
  .bl4{animation:bwrite 12s -9s infinite}
  .cursor{animation:cursor .7s infinite}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.5px)}}
  @keyframes blink{0%,8%,100%{transform:scaleY(1)}4%{transform:scaleY(0.1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.3px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.01);opacity:.51}}
  @keyframes arm-l{0%,100%{transform:rotate(0)}40%,60%{transform:rotate(-8deg)}}
  @keyframes arm-r{
    0%,100%{transform:rotate(-42deg)}
    20%,22%{transform:rotate(-36deg)}
    50%,52%{transform:rotate(-36deg)}
    75%,78%{transform:rotate(-48deg)}
  }
  @keyframes eyes{
    0%,100%{transform:translate(2px,-0.5px)}
    30%,40%{transform:translate(3px,-1px)}
    55%,70%{transform:translate(1.5px,-0.3px)}
  }
  @keyframes bwrite{
    0%,5%{transform:scaleX(0);opacity:0}
    6%{transform:scaleX(0);opacity:1}
    22%{transform:scaleX(1);opacity:1}
    75%,100%{transform:scaleX(1);opacity:1}
  }
  @keyframes cursor{0%,49%{opacity:1}50%,100%{opacity:0}}
</style></defs>

<!-- Shadow -->
<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Chalkboard frame -->
<rect x="14" y="-22" width="14" height="26" fill="#3E2723"/>
<!-- Board surface -->
<rect x="15.2" y="-21" width="11.6" height="23.5" fill="#1B5E20"/>
<!-- Board ledge -->
<rect x="14" y="3.5" width="14" height="1.5" fill="#4E342E"/>
<!-- Chalk on ledge -->
<rect x="15" y="3.7" width="2" height=".8" fill="#F5F5F5"/>
<rect x="17.5" y="3.7" width="1.5" height=".8" fill="#FFCC80"/>

<!-- Board content lines (appear left to right) -->
<rect class="code-line bl1" x="17" y="-18" width="8" height=".8" fill="#A5D6A7" opacity=".9"/>
<rect class="code-line bl2" x="17" y="-14.5" width="6.5" height=".8" fill="#A5D6A7" opacity=".9"/>
<rect class="code-line bl3" x="17" y="-11" width="9" height=".8" fill="#A5D6A7" opacity=".9"/>
<rect class="code-line bl4" x="17" y="-7.5" width="5.5" height=".8" fill="#A5D6A7" opacity=".9"/>
<!-- Sub-lines (indented) -->
<rect x="18.5" y="-16.5" width="5" height=".6" fill="#81C784" opacity=".6"/>
<rect x="18.5" y="-12.8" width="6" height=".6" fill="#81C784" opacity=".6"/>
<!-- Cursor blink -->
<rect class="cursor" x="17" y="-4.5" width=".8" height=".9" fill="#69F0AE"/>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body -->
<g class="bob"><g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <g class="eyes"><g class="blink" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g></g>
</g></g>

<!-- Left arm -->
<g class="bob"><g class="breathe">
  <g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>

<!-- Right arm + pointer stick -->
<g class="bob"><g class="breathe">
  <g class="arm-r">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
    <!-- Pointer stick -->
    <rect x="14.5" y="9.7" width="12" height=".6" fill="#8D6E63"/>
    <!-- Stick tip (bright) -->
    <rect x="26" y="9.5" width="1" height="1" fill="#FFEE58"/>
  </g>
</g></g>
</svg>
