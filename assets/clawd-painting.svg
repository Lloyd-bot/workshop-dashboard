<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .blink{transform-origin:7.5px 9px;animation:blink 4s infinite}
  .bob{transform-origin:7.5px 15px;animation:bob 2.5s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 2.5s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 2.5s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 2.5s infinite ease-in-out}
  .eyes{animation:eyes-paint 2.5s infinite ease-in-out}
  .stroke1{opacity:0;animation:paint-appear 7.5s 0s infinite}
  .stroke2{opacity:0;animation:paint-appear 7.5s 2.5s infinite}
  .stroke3{opacity:0;animation:paint-appear 7.5s 5s infinite}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.4px)}}
  @keyframes blink{0%,8%,100%{transform:scaleY(1)}4%{transform:scaleY(0.1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.3px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.01);opacity:.51}}
  @keyframes arm-l{0%,100%{transform:rotate(-5deg)}45%,60%{transform:rotate(5deg)}}
  @keyframes arm-r{0%,100%{transform:rotate(-20deg)}40%,55%{transform:rotate(5deg)}}
  @keyframes eyes-paint{0%,100%{transform:translate(-1px,.5px)}40%,55%{transform:translate(-1px,1px)}}
  @keyframes paint-appear{0%,13%{opacity:0;transform:scaleX(0)}20%,100%{opacity:1;transform:scaleX(1)}}
</style></defs>

<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Easel (left background) -->
<!-- Canvas frame -->
<rect x="-13" y="-3" width="11" height="10" fill="#1A237E"/>
<rect x="-13" y="-3" width="11" height="1" fill="#283593"/>
<rect x="-13" y="-3" width="1" height="10" fill="#283593"/>
<rect x="-3" y="-3" width="1" height="10" fill="#283593"/>
<rect x="-13" y="6" width="11" height="1" fill="#283593"/>
<!-- Canvas content (paint strokes appear) -->
<g style="transform-origin:-7.5px 1.5px">
  <rect class="stroke1" x="-12" y="-1.5" width="7" height="1" fill="#EF5350" style="transform-origin:-8.5px -1px"/>
  <rect class="stroke2" x="-12" y="1" width="5" height="1" fill="#42A5F5" style="transform-origin:-9.5px 1.5px"/>
  <rect class="stroke3" x="-11" y="3.5" width="6" height="1" fill="#FFEE58" style="transform-origin:-8px 4px"/>
</g>
<!-- Easel legs -->
<rect x="-11" y="7" width=".8" height="7" fill="#795548" transform="rotate(-8,-11,7)"/>
<rect x="-4" y="7" width=".8" height="7" fill="#795548" transform="rotate(8,-4,7)"/>
<rect x="-9" y="7" width=".8" height="5" fill="#795548" transform="rotate(5,-9,7)"/>
<!-- Palette on easel leg -->
<rect x="-11.5" y="8" width="3" height="2" fill="#8D6E63" opacity=".8"/>
<rect x="-11" y="8.2" width=".8" height=".8" fill="#EF5350"/>
<rect x="-10" y="8.2" width=".8" height=".8" fill="#42A5F5"/>
<rect x="-9" y="8.2" width=".8" height=".8" fill="#FFEE58"/>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body -->
<g class="bob"><g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <g class="eyes"><g class="blink" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g></g>
</g></g>

<!-- Left arm (holding palette) -->
<g class="bob"><g class="breathe">
  <g class="arm-l">
    <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
    <!-- Palette in left hand -->
    <rect x="-2" y="9.5" width="2.5" height="2" fill="#8D6E63"/>
    <rect x="-1.8" y="9.7" width=".7" height=".7" fill="#EF5350"/>
    <rect x="-1" y="9.7" width=".7" height=".7" fill="#FFEE58"/>
    <rect x="-.2" y="9.7" width=".7" height=".7" fill="#42A5F5"/>
  </g>
</g></g>

<!-- Right arm + brush LAST -->
<g class="bob"><g class="breathe">
  <g class="arm-r">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
    <!-- Brush handle -->
    <rect x="13.2" y="7" width=".8" height="3" fill="#795548"/>
    <!-- Brush ferrule -->
    <rect x="13" y="6.5" width="1.2" height=".8" fill="#9E9E9E"/>
    <!-- Brush bristles -->
    <rect x="13.1" y="5.5" width="1" height="1.2" fill="#F48FB1"/>
    <rect x="13.2" y="5" width=".8" height=".7" fill="#CE93D8"/>
  </g>
</g></g>
</svg>
