<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .blink{transform-origin:7.5px 9px;animation:blink 4s infinite}
  .bob{transform-origin:7.5px 15px;animation:bob 1.8s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 1.8s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 1.8s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 1.8s infinite ease-in-out}
  .eyes{animation:eyes-rake 1.8s infinite ease-in-out}
  .leaf{opacity:.85}
  .lv1{transform-origin:-6px 14px;animation:leaf-scatter 1.8s .2s infinite ease-in-out}
  .lv2{transform-origin:-10px 13.5px;animation:leaf-scatter 1.8s .5s infinite ease-in-out}
  .lv3{transform-origin:-4px 13px;animation:leaf-scatter 1.8s 0s infinite ease-in-out}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.4px)}}
  @keyframes blink{0%,8%,100%{transform:scaleY(1)}4%{transform:scaleY(0.1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.3px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.01);opacity:.51}}
  @keyframes arm-l{0%,100%{transform:rotate(-5deg)}45%,60%{transform:rotate(10deg)}}
  @keyframes arm-r{0%,100%{transform:rotate(18deg)}45%,60%{transform:rotate(-15deg)}}
  @keyframes eyes-rake{0%,100%{transform:translate(1px,.5px)}45%,60%{transform:translate(-1px,.5px)}}
  @keyframes leaf-scatter{0%,100%{transform:translateX(0) rotate(0)}45%,60%{transform:translateX(-2.5px) rotate(-20deg)}}
</style></defs>

<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Leaf pile left side -->
<rect x="-12" y="13.5" width="8" height="1" fill="#8BC34A"/>
<rect x="-13" y="14" width="10" height="1" fill="#7CB342"/>
<rect x="-12" y="14.5" width="9" height=".8" fill="#558B2F"/>
<!-- Individual leaves in pile -->
<rect x="-11" y="13.2" width="1.5" height="1" fill="#AED581"/>
<rect x="-8" y="13" width="1.2" height="1.2" fill="#CDDC39"/>
<rect x="-5.5" y="13.3" width="1.5" height=".9" fill="#9CCC65"/>

<!-- Scattered leaves (animated) -->
<rect class="leaf lv1" x="-7" y="13.5" width="1.5" height=".8" fill="#AED581"/>
<rect class="leaf lv2" x="-10" y="13" width="1.2" height="1" fill="#CDDC39"/>
<rect class="leaf lv3" x="-4" y="13.2" width="1.8" height=".9" fill="#9CCC65"/>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body -->
<g class="bob"><g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <g class="eyes"><g class="blink" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g></g>
</g></g>

<!-- Left arm (upper grip) -->
<g class="bob"><g class="breathe">
  <g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>

<!-- Right arm + rake LAST -->
<g class="bob"><g class="breathe">
  <g class="arm-r">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
    <!-- Rake handle -->
    <rect x="14" y="11" width=".8" height="6" fill="#795548"/>
    <!-- Rake head (cross bar) -->
    <rect x="11.5" y="16.5" width="5" height=".8" fill="#6D4C41"/>
    <!-- Rake tines -->
    <rect x="12" y="17.3" width=".6" height="1.2" fill="#5D4037"/>
    <rect x="13.2" y="17.3" width=".6" height="1.4" fill="#5D4037"/>
    <rect x="14.4" y="17.3" width=".6" height="1.2" fill="#5D4037"/>
    <rect x="15.6" y="17.3" width=".6" height="1" fill="#5D4037"/>
  </g>
</g></g>
</svg>
