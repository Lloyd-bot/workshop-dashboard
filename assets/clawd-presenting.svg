<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .blink{transform-origin:7.5px 9px;animation:blink 4s infinite}
  .bob{transform-origin:7.5px 15px;animation:bob 2s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 2s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 6s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 6s infinite ease-in-out}
  .eyes{animation:eyes-present 6s infinite ease-in-out}
  .slide-line{transform-box:fill-box;transform-origin:left center}
  .sl1{animation:slide-in 6s 0s infinite}
  .sl2{animation:slide-in 6s -1.5s infinite}
  .sl3{animation:slide-in 6s -3s infinite}
  .sl4{animation:slide-in 6s -4.5s infinite}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.4px)}}
  @keyframes blink{0%,8%,100%{transform:scaleY(1)}4%{transform:scaleY(0.1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.4px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.02);opacity:.52}}
  @keyframes arm-l{
    0%,100%{transform:rotate(0deg)}
    20%,35%{transform:rotate(-40deg)}
    55%,70%{transform:rotate(-20deg)}
  }
  @keyframes arm-r{
    0%,100%{transform:rotate(0deg)}
    20%,35%{transform:rotate(40deg)}
    55%,70%{transform:rotate(20deg)}
  }
  @keyframes eyes-present{
    0%,100%{transform:translate(0,0)}
    20%,35%{transform:translate(-1px,-0.5px)}
    55%,70%{transform:translate(1px,-0.5px)}
  }
  @keyframes slide-in{
    0%,5%{transform:scaleX(0);opacity:0}
    6%{opacity:1}
    18%{transform:scaleX(1);opacity:1}
    80%,100%{transform:scaleX(1);opacity:1}
  }
</style></defs>

<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Presentation slide (floating above/left) -->
<!-- Slide frame -->
<rect x="-14" y="-22" width="16" height="14" fill="#1565C0"/>
<rect x="-13" y="-21" width="14" height="12" fill="#1976D2"/>
<!-- Slide title bar -->
<rect x="-13" y="-21" width="14" height="2.5" fill="#0D47A1"/>
<!-- Title text lines -->
<rect class="slide-line sl1" x="-12" y="-20.3" width="8" height="1" fill="#E3F2FD"/>
<!-- Content lines -->
<rect class="slide-line sl2" x="-12" y="-17" width="6" height=".8" fill="#90CAF9"/>
<rect class="slide-line sl3" x="-12" y="-15" width="9" height=".8" fill="#90CAF9"/>
<rect class="slide-line sl4" x="-12" y="-13" width="5" height=".8" fill="#90CAF9"/>
<!-- Bullet dots -->
<rect x="-12.5" y="-16.7" width=".8" height=".8" fill="#42A5F5"/>
<rect x="-12.5" y="-14.7" width=".8" height=".8" fill="#42A5F5"/>
<rect x="-12.5" y="-12.7" width=".8" height=".8" fill="#42A5F5"/>
<!-- Slide stand legs -->
<rect x="-9" y="-8" width="1" height="4" fill="#5D4037"/>
<rect x="-6" y="-8" width="1" height="4" fill="#5D4037"/>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body -->
<g class="bob"><g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <g class="eyes"><g class="blink" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g></g>
</g></g>

<!-- Left arm (gestures toward slide) -->
<g class="bob"><g class="breathe">
  <g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>

<!-- Right arm (gestures outward) -->
<g class="bob"><g class="breathe">
  <g class="arm-r"><rect x="13" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>
</svg>
