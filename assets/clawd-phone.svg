<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .blink{transform-origin:7.5px 9px;animation:blink 4s infinite}
  .bob{transform-origin:7.5px 15px;animation:bob 2.5s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 2.5s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 2.5s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 8s infinite ease-in-out}
  .body-nod{transform-origin:7.5px 13px;animation:nod 2.5s infinite ease-in-out}
  .mouth{animation:talk 0.5s infinite}
  .signal{animation:signal 2s infinite}
  .sig1{animation:signal 2s 0s infinite}
  .sig2{animation:signal 2s -.5s infinite}
  .sig3{animation:signal 2s -1s infinite}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.4px)}}
  @keyframes blink{0%,8%,100%{transform:scaleY(1)}4%{transform:scaleY(0.1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.3px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.01);opacity:.51}}
  @keyframes arm-l{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-5deg)}}
  @keyframes arm-r{
    0%,100%{transform:rotate(-65deg)}
    30%,40%{transform:rotate(-68deg)}
    60%,70%{transform:rotate(-62deg)}
  }
  @keyframes nod{
    0%,100%{transform:translate(0,0)}
    30%,35%{transform:translate(0,.8px)}
    55%,60%{transform:translate(0,-.5px)}
  }
  @keyframes talk{
    0%,49%,100%{transform:scaleY(0.2);opacity:.8}
    50%{transform:scaleY(1);opacity:1}
  }
  @keyframes signal{
    0%,60%,100%{opacity:0;transform:scale(.5)}
    30%{opacity:.7;transform:scale(1)}
  }
</style></defs>

<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Wifi/signal waves (from phone) -->
<g fill="#4CAF50">
  <rect class="sig1" x="-3" y="-5" width="1" height="2"/>
  <rect class="sig2" x="-5" y="-7" width="1" height="4"/>
  <rect class="sig3" x="-7" y="-9" width="1" height="6"/>
</g>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body with nod -->
<g class="bob"><g class="breathe"><g class="body-nod">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <!-- Talking mouth -->
  <rect class="mouth" x="5.5" y="10.5" width="4" height="1.5" fill="#000" transform-origin="7.5px 11.2px"/>
  <g class="blink" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g>
</g></g></g>

<!-- Left arm -->
<g class="bob"><g class="breathe">
  <g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>

<!-- Right arm + phone held to ear -->
<g class="bob"><g class="breathe">
  <g class="arm-r">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
    <!-- Phone body -->
    <rect x="10.5" y="5" width="3" height="5.5" fill="#212121"/>
    <!-- Phone screen glow -->
    <rect x="11" y="5.5" width="2" height="4" fill="#1565C0"/>
    <!-- Phone speaker grill -->
    <rect x="11.5" y="5.3" width="1" height=".4" fill="#333"/>
    <!-- Phone bottom button -->
    <rect x="11.8" y="9.8" width=".5" height=".5" fill="#333"/>
  </g>
</g></g>
</svg>
