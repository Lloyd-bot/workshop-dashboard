<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .blink{transform-origin:7.5px 9px;animation:blink 4s infinite}
  .bob{transform-origin:7.5px 15px;animation:bob 2s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 2s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 2s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 2s infinite ease-in-out}
  .eyes{animation:eyes-reach 2s infinite ease-in-out}
  .apple{opacity:0}
  .ap1{animation:apple-fall 4s 0s infinite}
  .ap2{animation:apple-fall 4s 1.6s infinite}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.4px)}}
  @keyframes blink{0%,8%,100%{transform:scaleY(1)}4%{transform:scaleY(0.1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.3px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.01);opacity:.51}}
  @keyframes arm-l{0%,100%{transform:rotate(0deg)}40%,55%{transform:rotate(-5deg)}}
  @keyframes arm-r{0%,100%{transform:rotate(-52deg)}40%,55%{transform:rotate(-42deg)}}
  @keyframes eyes-reach{0%,100%{transform:translate(2px,-.5px)}40%,55%{transform:translate(2.5px,-1px)}}
  @keyframes apple-fall{0%,30%{opacity:0;transform:translate(0,0)}35%{opacity:1}90%{opacity:.7}100%{opacity:0;transform:translate(1px,9px)}}
</style></defs>

<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Basket left side -->
<rect x="-9" y="10.5" width="8" height=".8" fill="#8D6E63"/>
<rect x="-8.5" y="10" width="1" height="1.2" fill="#8D6E63"/>
<rect x="-2.5" y="10" width="1" height="1.2" fill="#8D6E63"/>
<rect x="-8.5" y="11.3" width="7" height="3.5" fill="#A1887F"/>
<rect x="-7.5" y="11" width="1.5" height="1.5" fill="#EF5350"/>
<rect x="-5.8" y="11.2" width="1.5" height="1.3" fill="#C62828"/>

<!-- Tree trunk right -->
<rect x="18" y="4" width="2" height="11" fill="#5D4037"/>
<rect x="17" y="14" width="4" height=".8" fill="#4E342E"/>

<!-- Branch left from trunk -->
<rect x="14" y="4" width="4" height="1" fill="#6D4C41"/>
<rect x="14" y="2" width="2" height="3" fill="#5D4037"/>

<!-- Foliage -->
<rect x="12" y="0" width="9" height="2" fill="#388E3C"/>
<rect x="11" y="1" width="11" height="2" fill="#4CAF50"/>
<rect x="12" y="2.5" width="8" height="2" fill="#66BB6A"/>
<rect x="13" y="-1" width="7" height="2" fill="#2E7D32"/>
<rect x="14" y="-2" width="5" height="2" fill="#388E3C"/>

<!-- Static apples on tree -->
<rect x="13.5" y="2" width="1.5" height="1.5" fill="#EF5350"/>
<rect x="17" y="1.5" width="1.5" height="1.5" fill="#C62828"/>
<rect x="15.5" y="3.5" width="1.5" height="1.5" fill="#EF9A9A"/>

<!-- Falling apples animated -->
<g fill="#EF5350">
  <rect class="apple ap1" x="13.5" y="2" width="1.5" height="1.5"/>
  <rect class="apple ap2" x="17" y="1.5" width="1.5" height="1.5"/>
</g>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body -->
<g class="bob"><g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <g class="eyes"><g class="blink" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g></g>
</g></g>

<!-- Left arm steady -->
<g class="bob"><g class="breathe">
  <g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>

<!-- Right arm reaches up LAST -->
<g class="bob"><g class="breathe">
  <g class="arm-r">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
  </g>
</g></g>
</svg>
