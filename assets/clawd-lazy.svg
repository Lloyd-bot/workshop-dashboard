<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 6s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 6s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 6s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 6s infinite ease-in-out}
  .zzz{opacity:0}
  .z1{animation:zzz 2.8s 0s infinite ease-out}
  .z2{animation:zzz 2.8s -.93s infinite ease-out}
  .z3{animation:zzz 2.8s -1.86s infinite ease-out}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.03,.97) translate(0,.6px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.04);opacity:.54}}
  @keyframes arm-l{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(-22deg)}}
  @keyframes arm-r{0%,100%{transform:rotate(18deg)}50%{transform:rotate(22deg)}}
  @keyframes zzz{
    0%{opacity:0;transform:translateY(0) scale(.6)}
    12%{opacity:.9}
    70%{opacity:.5;transform:translateY(-10px) scale(1)}
    100%{opacity:0;transform:translateY(-15px) scale(1.1)}
  }
</style></defs>

<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Z1 small -->
<g class="zzz z1" fill="#B0BEC5" transform="translate(9,2)">
  <rect x="0" y="0" width="3" height=".8"/>
  <rect x="2.2" y=".8" width=".8" height=".8"/>
  <rect x="1.2" y="1.6" width=".8" height=".8"/>
  <rect x="0" y="2.4" width="3" height=".8"/>
</g>

<!-- Z2 medium -->
<g class="zzz z2" fill="#78909C" transform="translate(11.5,-3)">
  <rect x="0" y="0" width="4" height="1"/>
  <rect x="3" y="1" width="1" height="1"/>
  <rect x="1.5" y="2" width="1" height="1"/>
  <rect x="0" y="3" width="4" height="1"/>
</g>

<!-- Z3 large -->
<g class="zzz z3" fill="#546E7A" transform="translate(13.5,-9)">
  <rect x="0" y="0" width="5" height="1.2"/>
  <rect x="3.8" y="1.2" width="1.2" height="1.2"/>
  <rect x="2.4" y="2.4" width="1.2" height="1.2"/>
  <rect x="1" y="3.6" width="1.2" height="1.2"/>
  <rect x="0" y="4.8" width="5" height="1.2"/>
</g>

<!-- Legs -->
<g fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body (very slow breathe, eyes shut) -->
<g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <!-- Eyes permanently shut -->
  <g fill="#000">
    <rect x="3.5" y="8.8" width="2" height=".9"/>
    <rect x="9.5" y="8.8" width="2" height=".9"/>
  </g>
</g>

<!-- Arms drooped forward -->
<g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
<g class="arm-r"><rect x="13" y="9" width="2" height="2" fill="#DE886D"/></g>
</svg>
