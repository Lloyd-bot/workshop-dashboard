<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .blink{transform-origin:7.5px 9px;animation:blink 5s infinite}
  .bob{transform-origin:7.5px 15px;animation:bob 1.5s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 1.5s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 1.5s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 1.5s infinite ease-in-out}
  .eyes{animation:eyes-look 1.5s infinite ease-in-out}
  .blade-lo{transform-origin:15px 9.8px;animation:snip 1.5s infinite ease-in-out}
  .leaf{opacity:0}
  .lf1{animation:leaf-fall 1.5s .82s infinite}
  .lf2{animation:leaf-fall 1.5s .92s infinite}
  .lf3{animation:leaf-fall 1.5s 1.05s infinite}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.4px)}}
  @keyframes blink{0%,8%,100%{transform:scaleY(1)}4%{transform:scaleY(0.1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.3px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.01);opacity:.51}}
  @keyframes arm-l{0%,100%{transform:rotate(0)}50%{transform:rotate(-8deg)}}
  @keyframes arm-r{0%,100%{transform:rotate(0)}55%,70%{transform:rotate(10deg)}}
  @keyframes eyes-look{0%,100%{transform:translate(2px,.5px)}}
  @keyframes snip{0%,45%,100%{transform:rotate(0)}57%,68%{transform:rotate(-18deg)}}
  @keyframes leaf-fall{
    0%,50%{opacity:0;transform:translate(0,0) rotate(0deg)}
    52%{opacity:1}
    100%{opacity:0;transform:translate(-3px,6px) rotate(60deg)}
  }
</style></defs>

<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Bush (background, right side) -->
<g transform="translate(17,-3)">
  <!-- Bush foliage -->
  <rect x="2" y="-2" width="4" height="1" fill="#388E3C"/>
  <rect x="1" y="-1" width="6" height="1" fill="#4CAF50"/>
  <rect x="0" y="0"  width="8" height="1" fill="#66BB6A"/>
  <rect x="-1" y="1" width="9" height="2" fill="#81C784"/>
  <rect x="0" y="3"  width="8" height="1" fill="#66BB6A"/>
  <rect x="1" y="4"  width="6" height="1" fill="#4CAF50"/>
  <rect x="2" y="5"  width="4" height="1" fill="#388E3C"/>
  <!-- A few darker spots for depth -->
  <rect x="3" y="0" width="2" height="1" fill="#2E7D32" opacity=".5"/>
  <rect x="1" y="2" width="2" height="1" fill="#2E7D32" opacity=".4"/>
  <!-- Stem -->
  <rect x="3" y="6" width="2" height="5" fill="#558B2F"/>
</g>

<!-- Falling snipped leaves (near bush, right side) -->
<g fill="#8BC34A">
  <rect class="leaf lf1" x="20" y="7" width="1.5" height="1"/>
  <rect class="leaf lf2" x="22" y="5" width="1" height="1.2"/>
  <rect class="leaf lf3" x="19" y="4" width="1.2" height="1"/>
</g>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body -->
<g class="bob"><g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <g class="eyes"><g class="blink" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g></g>
</g></g>

<!-- Left arm -->
<g class="bob"><g class="breathe">
  <g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>

<!-- Right arm + pruning shears -->
<g class="bob"><g class="breathe">
  <g class="arm-r">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
    <!-- Shear grips -->
    <rect x="14.2" y="10.5" width=".9" height="3.5" fill="#607D8B"/>
    <rect x="15.3" y="10.5" width=".9" height="3.5" fill="#607D8B"/>
    <!-- Pivot screw -->
    <rect x="14.7" y="10.3" width=".8" height=".8" fill="#455A64"/>
    <!-- Upper blade (fixed) -->
    <rect x="15" y="9.0" width="7" height=".8" fill="#B0BEC5"/>
    <rect x="21.5" y="8.6" width="1" height=".8" fill="#90A4AE"/>
    <!-- Lower blade (snaps closed) -->
    <g class="blade-lo">
      <rect x="15" y="9.8" width="6.5" height=".8" fill="#9E9E9E"/>
      <rect x="21" y="9.8" width="1" height=".8" fill="#78909C"/>
    </g>
  </g>
</g></g>
</svg>
