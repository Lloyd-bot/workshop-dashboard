<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .blink{transform-origin:7.5px 9px;animation:blink 5s infinite}
  .bob{transform-origin:7.5px 15px;animation:bob 1.2s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 1.2s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 1.2s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 1.2s infinite ease-in-out}
  .needle-l{transform-origin:2px 10px;animation:arm-l 1.2s infinite ease-in-out}
  .needle-r{transform-origin:14px 10px;animation:arm-r 1.2s infinite ease-in-out}
  .fabric{transform-origin:7.5px 14px;animation:fabric-grow 4.8s infinite}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.4px)}}
  @keyframes blink{0%,8%,100%{transform:scaleY(1)}4%{transform:scaleY(0.1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.25px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.01);opacity:.51}}
  @keyframes arm-l{0%,100%{transform:rotate(20deg)}50%{transform:rotate(30deg)}}
  @keyframes arm-r{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(-30deg)}}
  @keyframes fabric-grow{0%,60%{transform:scaleY(1)}70%,100%{transform:scaleY(1.08)}}
</style></defs>

<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Yarn ball in lap (background) -->
<rect x="4" y="12" width="7" height="4" fill="#EF5350" opacity=".15"/><!-- shadow of yarn -->
<rect x="5" y="12.5" width="5" height="3" fill="#EF5350"/>
<rect x="4.5" y="13" width="6" height="2" fill="#EF5350"/>
<rect x="5" y="12" width="5" height="1" fill="#E53935"/>
<rect x="5.5" y="11.8" width="4" height=".5" fill="#EF9A9A"/>
<!-- Yarn strand going up to needles -->
<rect x="6.5" y="10" width=".4" height="2" fill="#EF9A9A" opacity=".7"/>
<rect x="8.5" y="10" width=".4" height="2" fill="#EF9A9A" opacity=".7"/>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body -->
<g class="bob"><g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <g class="blink" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g>
</g></g>

<!-- Left arm -->
<g class="bob"><g class="breathe">
  <g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>
<!-- Right arm -->
<g class="bob"><g class="breathe">
  <g class="arm-r"><rect x="13" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>

<!-- Knitting needles + fabric LAST -->
<g class="bob"><g class="breathe">
  <!-- Left needle -->
  <g class="needle-l">
    <rect x="-1.5" y="9.5" width=".6" height="7" fill="#B0BEC5"/>
    <rect x="-1.7" y="9.2" width="1" height=".6" fill="#78909C"/>
  </g>
  <!-- Right needle -->
  <g class="needle-r">
    <rect x="14.9" y="9.5" width=".6" height="7" fill="#B0BEC5"/>
    <rect x="14.7" y="9.2" width="1" height=".6" fill="#78909C"/>
  </g>
  <!-- Growing fabric strip between needles -->
  <g class="fabric">
    <rect x="3" y="11" width="9" height=".8" fill="#EF5350"/>
    <rect x="3" y="11.8" width="9" height=".7" fill="#E53935"/>
    <rect x="3" y="12.5" width="9" height=".7" fill="#EF9A9A"/>
    <rect x="3.5" y="10.8" width="8" height=".5" fill="#E57373"/>
  </g>
</g></g>
</svg>
