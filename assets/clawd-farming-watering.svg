<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .blink{transform-origin:7.5px 9px;animation:blink 5s infinite}
  .bob{transform-origin:7.5px 15px;animation:bob 2.6s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 2.6s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 2.6s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 2.6s infinite ease-in-out}
  .eyes{animation:eyes 2.6s infinite ease-in-out}
  .wd{opacity:0}
  .wd1{animation:wdrop 1s 0s infinite linear}
  .wd2{animation:wdrop 1s -.33s infinite linear}
  .wd3{animation:wdrop 1s -.66s infinite linear}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.5px)}}
  @keyframes blink{0%,8%,100%{transform:scaleY(1)}4%{transform:scaleY(0.1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.4px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.02);opacity:.52}}
  @keyframes arm-l{0%,100%{transform:rotate(0)}50%{transform:rotate(-6deg)}}
  @keyframes arm-r{0%,100%{transform:rotate(0)}40%,65%{transform:rotate(22deg)}}
  @keyframes eyes{0%,100%{transform:translate(1px,1px)}40%,65%{transform:translate(2px,1.5px)}}
  @keyframes wdrop{0%{opacity:0;transform:translateY(0)}15%{opacity:.85}80%{opacity:.4;transform:translateY(5px)}100%{opacity:0;transform:translateY(6.5px)}}
</style></defs>

<!-- Shadow -->
<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Plant -->
<rect x="20" y="12" width="4" height="3" fill="#8D6E63"/>
<rect x="19.5" y="11.3" width="5" height=".9" fill="#795548"/>
<rect x="20.3" y="10.8" width="3.4" height=".7" fill="#4E342E"/>
<rect x="21.5" y="5" width="1" height="6" fill="#558B2F"/>
<rect x="18.5" y="3.5" width="3" height="2" fill="#66BB6A"/>
<rect x="22" y="2.5" width="3" height="2" fill="#66BB6A"/>
<rect x="19.5" y="1" width="4" height="2.2" fill="#81C784"/>

<!-- Water drops (fall from spout area) -->
<g fill="#40C4FF">
  <rect class="wd wd1" x="21.5" y="12" width="1" height="1.5"/>
  <rect class="wd wd2" x="22.5" y="12" width=".8" height="1.2"/>
  <rect class="wd wd3" x="20.8" y="12" width=".8" height="1.3"/>
</g>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body -->
<g class="bob"><g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <g class="eyes"><g class="blink" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g></g>
</g></g>

<!-- Left arm -->
<g class="bob"><g class="breathe">
  <g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>

<!-- Right arm + watering can -->
<g class="bob"><g class="breathe">
  <g class="arm-r">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
    <!-- Can body -->
    <rect x="14.5" y="7" width="5" height="3" fill="#546E7A"/>
    <!-- Handle arc -->
    <rect x="15.5" y="6.2" width="3" height=".8" fill="#607D8B"/>
    <!-- Rivet details -->
    <rect x="15" y="7.6" width=".6" height=".6" fill="#37474F"/>
    <rect x="18.6" y="7.6" width=".6" height=".6" fill="#37474F"/>
    <!-- Spout body -->
    <rect x="19" y="8.3" width="3.5" height="1" fill="#546E7A"/>
    <!-- Spout tip (down) -->
    <rect x="22" y="9.3" width="1" height="2" fill="#546E7A"/>
    <!-- Spout perforations -->
    <rect x="22" y="11.1" width=".5" height=".5" fill="#263238"/>
    <rect x="22.7" y="11.1" width=".5" height=".5" fill="#263238"/>
  </g>
</g></g>
</svg>
