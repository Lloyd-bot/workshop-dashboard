<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .bob{transform-origin:7.5px 15px;animation:bob 4s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 4s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 4s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 4s infinite ease-in-out}
  .sip-eyes{transform-origin:7.5px 9px;animation:sip-close 8s infinite}
  .steam{opacity:0}
  .s1{animation:steam 1.8s 0s infinite ease-out}
  .s2{animation:steam 1.8s -.7s infinite ease-out}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.4px)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.3px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.01);opacity:.51}}
  @keyframes arm-l{0%,100%{transform:rotate(10deg)}30%,50%{transform:rotate(15deg)}}
  @keyframes arm-r{0%,100%{transform:rotate(-15deg)}30%,50%{transform:rotate(-42deg)}}
  @keyframes sip-close{0%,25%,55%,100%{transform:scaleY(1)}5%{transform:scaleY(0.1)}32%,50%{transform:scaleY(0.12)}}
  @keyframes steam{0%{opacity:0;transform:translateY(0) scaleX(1)}20%{opacity:.6}60%{transform:translateY(-4px) scaleX(1.3)}100%{opacity:0;transform:translateY(-7px) scaleX(.8)}}
</style></defs>

<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body -->
<g class="bob"><g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <g class="sip-eyes" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g>
</g></g>

<!-- Left arm (relaxed) -->
<g class="bob"><g class="breathe">
  <g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>

<!-- Right arm + small mug — mug rotates with arm, lifts to face for sip -->
<g class="bob"><g class="breathe">
  <g class="arm-r">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
    <!-- Steam (inside arm group so it stays above mug) -->
    <rect class="steam s1" x="15.4" y="6.8" width=".6" height="1.2" fill="#90A4AE"/>
    <rect class="steam s2" x="16.6" y="6.8" width=".6" height="1.2" fill="#90A4AE"/>
    <!-- Mug rim -->
    <rect x="14.5" y="8.2" width="3.2" height=".6" fill="#795548"/>
    <!-- Mug body -->
    <rect x="14.8" y="8.8" width="2.8" height="2.2" fill="#6D4C41"/>
    <!-- Coffee surface -->
    <rect x="15" y="8.8" width="2.4" height=".6" fill="#4E342E"/>
    <!-- Handle -->
    <rect x="17.3" y="9.2" width=".8" height=".4" fill="#5D4037"/>
    <rect x="17.7" y="9.2" width=".4" height="1.4" fill="#5D4037"/>
    <rect x="17.3" y="10.2" width=".8" height=".4" fill="#5D4037"/>
  </g>
</g></g>
</svg>
