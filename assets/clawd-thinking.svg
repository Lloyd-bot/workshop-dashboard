<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500" shape-rendering="crispEdges">
<defs><style>
  .breathe{transform-origin:7.5px 13px;animation:breathe 3.2s infinite ease-in-out}
  .blink{transform-origin:7.5px 9px;animation:blink 7s infinite}
  .bob{transform-origin:7.5px 15px;animation:bob 4s infinite ease-in-out}
  .shad{transform-origin:7.5px 15.5px;animation:shad 4s infinite ease-in-out}
  .arm-l{transform-origin:2px 10px;animation:arm-l 4s infinite ease-in-out}
  .arm-r{transform-origin:14px 10px;animation:arm-r 8s infinite ease-in-out}
  .eyes{animation:eyes-think 8s infinite ease-in-out}
  .bubble{animation:bubble-pop 8s infinite ease-in-out}
  .b1{animation:bubble-pop 8s .2s infinite ease-in-out}
  .b2{animation:bubble-pop 8s .5s infinite ease-in-out}
  .b3{animation:bubble-pop 8s .9s infinite ease-in-out}
  .b4{animation:bubble-pop 8s 1.4s infinite ease-in-out}
  @keyframes breathe{0%,100%{transform:scale(1,1) translate(0,0)}50%{transform:scale(1.02,.98) translate(0,.4px)}}
  @keyframes blink{0%,5%,100%{transform:scaleY(1)}2.5%{transform:scaleY(0.1)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(.3px)}}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(1.01);opacity:.51}}
  @keyframes arm-l{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-5deg)}}
  @keyframes arm-r{
    0%,100%{transform:rotate(-55deg)}
    30%,40%{transform:rotate(-58deg)}
    60%,70%{transform:rotate(-52deg)}
  }
  @keyframes eyes-think{
    0%,100%{transform:translate(-1.5px,-1px)}
    25%,45%{transform:translate(-2px,-1.5px)}
    65%,80%{transform:translate(-1px,-0.8px)}
  }
  @keyframes bubble-pop{
    0%,10%{opacity:0;transform:scale(0)}
    20%,80%{opacity:1;transform:scale(1)}
    95%,100%{opacity:0;transform:scale(0)}
  }
</style></defs>

<rect class="shad" x="3" y="15" width="9" height="1" fill="#000" opacity=".5"/>

<!-- Thought bubble chain (small dots leading up) -->
<rect class="b1" x="8" y="2" width="1.5" height="1.5" rx=".5" fill="#B0BEC5"/>
<rect class="b2" x="9.5" y="-1" width="2" height="2" rx="1" fill="#B0BEC5"/>
<rect class="b3" x="11" y="-4.5" width="3" height="3" rx="1" fill="#90A4AE"/>
<!-- Main thought bubble -->
<g class="b4">
  <rect x="9" y="-13" width="10" height="8" fill="#ECEFF1"/>
  <rect x="8" y="-12" width="12" height="6" fill="#ECEFF1"/>
  <rect x="9" y="-14" width="10" height="2" fill="#ECEFF1"/>
  <!-- Outline pixels -->
  <rect x="8" y="-14" width="12" height="1" fill="#B0BEC5"/>
  <rect x="7" y="-13" width="1" height="8" fill="#B0BEC5"/>
  <rect x="20" y="-13" width="1" height="8" fill="#B0BEC5"/>
  <rect x="8" y="-5" width="12" height="1" fill="#B0BEC5"/>
  <!-- Question mark inside bubble -->
  <rect x="14" y="-12" width="2" height="1" fill="#78909C"/>
  <rect x="15.5" y="-11" width="1.5" height="1" fill="#78909C"/>
  <rect x="14.5" y="-10" width="1.5" height="1" fill="#78909C"/>
  <rect x="14.5" y="-8" width="1.5" height="1.5" fill="#78909C"/>
  <rect x="14.5" y="-6.2" width="1.5" height="1.5" fill="#78909C"/>
</g>

<!-- Legs -->
<g class="bob" fill="#DE886D">
  <rect x="3" y="13" width="1" height="2"/>
  <rect x="5" y="13" width="1" height="2"/>
  <rect x="9" y="13" width="1" height="2"/>
  <rect x="11" y="13" width="1" height="2"/>
</g>

<!-- Body -->
<g class="bob"><g class="breathe">
  <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
  <g class="eyes"><g class="blink" fill="#000">
    <rect x="4" y="8" width="1" height="2"/>
    <rect x="10" y="8" width="1" height="2"/>
  </g></g>
</g></g>

<!-- Left arm (relaxed at side) -->
<g class="bob"><g class="breathe">
  <g class="arm-l"><rect x="0" y="9" width="2" height="2" fill="#DE886D"/></g>
</g></g>

<!-- Right arm raised to chin -->
<g class="bob"><g class="breathe">
  <g class="arm-r">
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>
  </g>
</g></g>
</svg>
